[__config__]
http_timeout = 30
keyfile = "keys.toml"
oldver = "old_ver.json"
newver = "new_ver.json"

[cdesktopenv]
source = "git"
git = "https://git.code.sf.net/p/cdesktopenv/code"
include_regex = '^[0-9]+\.[0-9]+\.[0-9]+$'
use_max_tag = true

[dev-proxy-bin]
source = "github"
github = "dotnet/dev-proxy"
use_latest_release = "true"

[fsautocomplete-bin]
source = "github"
github = "ionide/FsAutoComplete"
use_latest_release = "true"

[ghcup-hs]
source = "github"
github = "haskell/ghcup-hs"
use_latest_release = "true"

[gnome-shell-extension-tiling-shell]
source = "github"
github = "domferr/tilingshell"
use_latest_release = "true"

[ida-pro]
source = "regex"
url = "https://docs.hex-rays.com/release-notes"
regex = "IDA ([0-9]+\\.[0-9][a-zA-Z0-9. ]*)"

[infer-bin]
source = "github"
github = "facebook/infer"
use_latest_release = "true"

[intel-gmmlib]
source = "pacman"
pacman = "intel-gmmlib"
strip_release = "true"

[intel-media-driver]
source = "pacman"
pacman = "intel-media-driver"
strip_release = "true"

[intel-oneapi]
source = "cmd"
cmd = "curl -sL 'https://www.intel.com/content/www/us/en/developer/tools/oneapi/base-toolkit-download.html' | grep -oP 'targetValue2 = \"\\K[0-9.]+'"

[intel-openvino]
source = "github"
github = "openvinotoolkit/openvino"
use_latest_release = "true"

[jsonpath-python]
source = "github"
github = "sean2077/jsonpath-python"
use_latest_release = true

[jdk25-openj9-bin]
source = "github"
github = "ibmruntimes/semeru25-binaries"
use_latest_release = "true"

["llama.cpp"]
source = "git"
git = "https://github.com/ggml-org/llama.cpp.git"
use_commit = true

[leanux]
source = "github"
github = "jmspit/leanux"
use_latest_release = "true"

[marksman]
source = "github"
github = "artempyanykh/marksman"
use_latest_tag = "true"

[marsdev]
source = "github"
github = "andwn/marsdev"
use_latest_tag = "true"

[mistral-vibe]
source = "github"
github = "mistralai/mistral-vibe"
use_latest_release = true

[moonlight-qt]
source = "github"
github = "moonlight-stream/moonlight-qt"
use_latest_release = "true"

[nand2tetris]
source = "regex"
url = "https://www.nand2tetris.org/software"
regex = "drive\\.google\\.com/open\\?id=([A-Za-z0-9_-]+)"
user_agent = "Mozilla/5.0 (X11; Linux x86_64; rv:128.0) Gecko/20100101 Firefox/128.0"

[netcoredbg]
source = "github"
github = "Samsung/netcoredbg"
use_latest_release = "true"

[openshift-codeready-bin]
source = "regex"
regex = "\\d+\\.\\d+\\.\\d+"
url = "https://mirror.openshift.com/pub/openshift-v4/clients/crc/"

[openshift-developer-bin]
source = "regex"
regex = "v\\d+\\.\\d+\\.\\d+"
url = "https://mirror.openshift.com/pub/openshift-v4/clients/odo/"

[openshift-pipelines-bin]
source = "regex"
regex = "\\d+\\.\\d+\\.\\d+"
url = "https://mirror.openshift.com/pub/openshift-v4/clients/pipelines/"

[passmark-performancetest-bin]
source = "regex"
regex = ", (v\\d+\\.\\d+ Build \\d+), "
url = "https://www.passmark.com/products/pt_linux/download.php"
from_pattern = " Build "
to_pattern = "."
user_agent = "Mozilla/5.0 (X11; Linux x86_64; rv:128.0) Gecko/20100101 Firefox/128.0"

[pragmatapro-fonts]
source = "regex"
regex = "The actual version is (\\d{1}\\.\\d{3})"
url = "https://fsd.it/shop/fonts/pragmatapro/"

[python-agent-client-protocol]
source = "github"
github = "agentclientprotocol/python-sdk"
use_latest_release = true

[pupdate-bin]
source = "github"
github = "mattpannella/pupdate"
use_latest_release = "true"

[pvsneslib]
source = "github"
github = "alekmaul/pvsneslib"
use_latest_tag = "true"

[rcu-bin]
source = "regex"
regex = "v\\d+\\.\\d+\\.\\d+"
url = "https://files.davisr.me/projects/rcu/download-59ck3sdT/"
verify_cert = false

[retro68]
source = "git"
git = "https://github.com/autc04/Retro68.git"
use_commit = true

[ruby-commander]
source = "github"
github = "commander-rb/commander"
use_latest_tag = "true"

[ruby-parlour]
source = "github"
github = "AaronC81/parlour"
use_latest_tag = "true"

[ruby-rubocop-yard]
source = "github"
github = "ksss/rubocop-yard"
use_latest_tag = "true"
prefix = "v"

[ruby-solargraph]
source = "github"
github = "castwide/solargraph"
use_latest_tag = "true"

[ruby-sord]
source = "gems"
gems = "sord"

[ruby-yard-activesupport-concern]
source = "github"
github = "digitalcuisine/yard-activesupport-concern"
use_latest_tag = "true"

[ruby-yard-solargraph]
source = "github"
github = "castwide/yard-solargraph"
use_latest_tag = "true"

[rusty-psn-bin]
source = "github"
github = "RainbowCookie32/rusty-psn"
use_latest_release = "true"

[samba]
source = "pacman"
pacman = "samba"
strip_release = "true"

[sbom-tool-bin]
source = "github"
github = "microsoft/sbom-tool"
use_latest_release = "true"

[scheme-langserver-bin]
source = "github"
github = "ufo5260987423/scheme-langserver"
use_latest_release = "true"

[svelte-language-server]
source = "github"
github = "sveltejs/language-tools"
use_latest_tag = "true"

[tidal-dl-ng]
source = "cmd"
cmd = "curl -sL 'https://archive.org/advancedsearch.php?q=tidal_dl_ng-&fl[]=identifier&sort[]=date+desc&rows=50&output=json' | grep -oE 'tidal_dl_ng-[0-9]+\\.[0-9]+(\\.[0-9]+)*' | head -1 | sed 's/tidal_dl_ng-//'"

[winexe]
source = "pacman"
pacman = "samba"
strip_release = "true"
from_pattern = "^\\d+:"
to_pattern = ""

[wolfram]
source = "regex"
url = "https://www.wolfram.com/mathematica/quick-revision-history/"
regex = "<span class=\"title\">Mathematica ([0-9.]+)</span>"

[yaml-language-server]
source = "git"
git = "https://github.com/redhat-developer/yaml-language-server.git"
prefix = "v"
